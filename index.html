<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Overpass:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Age calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
     
    <main>
      <form action="">
        <div class="inputs">
          <div class="day-filed">
            <label for="day">Day</label>
            <input
              type="number"
              id="day"
              name="day"
              
              placeholder="DDD"
            />
            <span class="none" id="day-error" aria-describedby="day"
              >must be avalid day</span
            >
          </div>
          <div class="month-field">
            <label for="month">Month</label>
            <input
              type="number"
              placeholder="DDD"
              name="month"
              id="month"
              
            />
            <span class="none" id="month-error" aria-describedby="month"
              >must be avalid month</span
            >
          </div>
          <div class="year-field">
            <label for="year">Year</label>
            <input
              type="number"
              placeholder="DDD"
              name="year"
              id="year"
               
            />
            <span class="none" id="year-error" aria-describedby="year"
              >must be avalid year</span
            >
          </div>
        </div>
        <div class="btn-box">
          <button type="submit" aria-label="Calculate age">
            <img src="images/icon-arrow.svg" alt="icon-arrow" />
          </button>
        </div>
      </form>
      <div id="result"><span class="day-result">- -</span>days</div>
      <div id="result"><span class="month-result">- -</span>month</div>
      <div id="result"><span class="year-result">- -</span>years</div>
    </main>

 
 
    <script src="msin.js"></script>
  </body>
</html>
